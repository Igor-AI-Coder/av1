<div class="min-h-screen bg-gray-100 px-8 py-8">
  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="flex items-start justify-between mb-2">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Gerenciador de Tarefas - Estudos</h1>
        <p class="text-sm text-gray-500">Cards em 3 colunas: Para fazer, Em andamento, Concluídas.</p>
      </div>
      <button
        (click)="openModal()"
        class="w-10 h-10 bg-indigo-600 text-white rounded-full text-xl flex items-center justify-center shadow hover:bg-indigo-700"
      >+</button>
    </div>

    <p class="text-sm text-indigo-500 mb-6">
      Adicione novas tarefas pelo botão <span class="font-bold">+</span>.
    </p>

    <!-- Colunas -->
    <div class="grid grid-cols-3 gap-6">
      <app-task-column
        title="Para fazer"
        [tasks]="todoTasks()"
        (editTask)="openEditModal($event)"
        (deleteTask)="deleteTask($event)"
      />
      <app-task-column
        title="Em andamento"
        [tasks]="inProgressTasks()"
        (editTask)="openEditModal($event)"
        (deleteTask)="deleteTask($event)"
      />
      <app-task-column
        title="Concluídas"
        [tasks]="doneTasks()"
        (editTask)="openEditModal($event)"
        (deleteTask)="deleteTask($event)"
      />
    </div>

    <p class="text-xs text-indigo-400 mt-6">Salvo no armazenamento local do seu navegador.</p>
  </div>
</div>

@if (showModal()) {
  <app-task-modal
    [taskToEdit]="taskToEdit()"
    (save)="saveTask($event)"
    (close)="closeModal()"
  />
}
